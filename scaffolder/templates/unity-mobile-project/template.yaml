apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: unity-mobile-project
  title: Unity Mobile Game Project
  description: |
    Scaffold a new Unity mobile game project with:
    - IL2CPP configuration for iOS/Android
    - Assembly Definition Files for incremental builds
    - TeamCity CI/CD pipeline
    - Signing and store submission setup
  tags:
    - unity
    - mobile
    - ios
    - android
    - teamcity
spec:
  owner: team17-build-engineering
  type: game

  parameters:
    - title: Project Details
      required:
        - projectName
        - unityVersion
      properties:
        projectName:
          title: Project Name
          type: string
          description: Name of the game project
          pattern: '^[A-Z][a-zA-Z0-9]+$'
          ui:autofocus: true

        unityVersion:
          title: Unity Version
          type: string
          enum:
            - '2022.3'
            - '6000.0'
          default: '6000.0'
          enumNames:
            - 'Unity 2022.3 LTS'
            - 'Unity 6 (Recommended)'

        description:
          title: Project Description
          type: string
          ui:widget: textarea

        team:
          title: Owning Team
          type: string
          ui:field: OwnerPicker

    - title: Platform Configuration
      properties:
        targetPlatforms:
          title: Target Platforms
          type: array
          items:
            type: string
            enum:
              - Android
              - iOS
              - Win64
          default:
            - Android
            - iOS
          uniqueItems: true

        androidMinSdk:
          title: Android Minimum SDK
          type: integer
          default: 24
          minimum: 21
          maximum: 34

        iosMinVersion:
          title: iOS Minimum Version
          type: string
          default: '14.0'
          enum:
            - '13.0'
            - '14.0'
            - '15.0'
            - '16.0'

    - title: Build Configuration
      properties:
        scriptingBackend:
          title: Scripting Backend
          type: string
          enum:
            - IL2CPP
            - Mono
          default: IL2CPP
          description: IL2CPP required for iOS and recommended for Android

        enableAddressables:
          title: Enable Addressables
          type: boolean
          default: true
          description: Use Addressables for asset management and downloadable content

        enableAccelerator:
          title: Enable Unity Accelerator
          type: boolean
          default: true
          description: Use shared asset import cache

  steps:
    - id: fetch-base
      name: Fetch Base Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          projectName: ${{ parameters.projectName }}
          unityVersion: ${{ parameters.unityVersion }}
          description: ${{ parameters.description }}
          team: ${{ parameters.team }}
          targetPlatforms: ${{ parameters.targetPlatforms }}
          androidMinSdk: ${{ parameters.androidMinSdk }}
          iosMinVersion: ${{ parameters.iosMinVersion }}
          scriptingBackend: ${{ parameters.scriptingBackend }}
          enableAddressables: ${{ parameters.enableAddressables }}
          enableAccelerator: ${{ parameters.enableAccelerator }}

    - id: register-catalog
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['fetch-base'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: View in Catalog
        icon: catalog
        entityRef: ${{ steps['register-catalog'].output.entityRef }}
    text:
      - title: Next Steps
        content: |
          ## Your Unity project is ready!

          ### 1. Clone the Repository
          ```bash
          git clone <repo-url>
          cd ${{ parameters.projectName }}
          ```

          ### 2. Open in Unity Hub
          Add the project folder in Unity Hub and open with Unity ${{ parameters.unityVersion }}

          ### 3. Configure Signing
          - Android: Add keystore to secure storage
          - iOS: Configure provisioning profiles

          ### 4. First Build
          Trigger the TeamCity build to verify everything works
