[/Script/EngineSettings.GeneralProjectSettings]
ProjectID=${{values.projectName | lower}}
ProjectName=${{values.projectName}}
ProjectDisplayedTitle=${{values.projectName}}
ProjectVersion=1.0.0.0
CompanyName=Team17
CompanyDistinguishedName=com.team17.${{values.projectName | lower}}
Copyright=Copyright Team17 Digital Ltd. All Rights Reserved.
bShouldWindowPreserveAspectRatio=True

[/Script/UnrealEd.ProjectPackagingSettings]
BuildConfiguration=${{values.buildConfiguration}}
{%- for platform in values.targetPlatforms %}
+MapsToCook=(FilePath="/Game/Maps/Level_Main")
{%- endfor %}
FullRebuild=False
ForDistribution=True
IncludeDebugFiles=False
BlueprintNativizationMethod=Disabled
bShareMaterialShaderCode=True
bDeterministicShaderCodeOrder=True

[/Script/Engine.GameEngine]
bUseEngineModuleAsDefaultEditor=True

[Internationalization]
+LocalizationPaths=%GAMEDIR%Localization/Game
