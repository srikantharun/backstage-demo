[/Script/EngineSettings.GameMapsSettings]
GameDefaultMap=/Game/Maps/MainMenu
EditorStartupMap=/Game/Maps/DevMap

[/Script/Engine.RendererSettings]
{%- if values.engineVersion >= "5.0" %}
r.Nanite=True
r.Lumen.DiffuseIndirect.Allow=True
r.Lumen.Reflections.Allow=True
{%- else %}
r.DefaultFeature.AutoExposure=True
{%- endif %}

[/Script/Engine.Engine]
bUseFixedFrameRate=False
FixedFrameRate=60.000000

[/Script/HardwareTargeting.HardwareTargetingSettings]
TargetedHardwareClass=Desktop
DefaultGraphicsPerformance=Maximum

[/Script/Engine.PhysicsSettings]
bEnableAsyncCollisionEvents=True

{%- if values.enableDistributedBuild %}
[BuildConfiguration]
; Distributed build settings for FASTBuild/Incredibuild/UBA
bAllowDistributedBuild=True
{%- endif %}

[ConsoleVariables]
; Optimized settings for ${{values.projectName}}
wp.Runtime.EnablePawnSpawnThrottle=1

[/Script/Engine.StreamingSettings]
s.AsyncLoadingThreadEnabled=True
